<!DOCTYPE html>
<html lang="en">

    <link rel="icon" type="image/png" href="Logo.png">

<body>
    <canvas id="matrixCanvas"></canvas>

    <div id="password-modal" class="hidden">
        <div class="modal-content">
            <h3>> VANGUARD_SYSTEM_LOCKED</h3>
